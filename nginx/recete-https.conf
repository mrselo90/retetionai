# Recete Production Nginx Configuration — HTTPS (Let's Encrypt)
#
# NOTE: Place this directive in /etc/nginx/nginx.conf inside the http{} block
# (or in a conf.d snippet) if not already present:
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# See docs/deployment/PORTS_AND_ROUTING.md for port conventions.
#
# Services:
#   web      (Next.js)      → 127.0.0.1:3001  → recete.co.uk
#   api      (Hono)         → 127.0.0.1:3002  → api.recete.co.uk
#   shopify  (React Router) → 127.0.0.1:3003  → shop.recete.co.uk
#
# Install:
#   sudo cp nginx/recete-https.conf /etc/nginx/sites-available/recete
#   sudo ln -sf /etc/nginx/sites-available/recete /etc/nginx/sites-enabled/recete
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ──────────────────────────────────────────────
# Shared SSL settings (included by each server block)
# ──────────────────────────────────────────────
# Using ssl_certificate / ssl_certificate_key per-block so certbot
# can manage each domain independently.

# ──────────────────────────────────────────────
# 1. recete.co.uk  —  Standalone Web (Next.js)
# ──────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name recete.co.uk www.recete.co.uk;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recete.co.uk www.recete.co.uk;

    ssl_certificate     /etc/letsencrypt/live/recete.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recete.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Frontend (Next.js on port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # /api-backend/* → API (strip prefix, keep same-origin browser calls)
    location /api-backend/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct API routes (webhook receivers, OAuth callbacks)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host   $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhooks/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# ──────────────────────────────────────────────
# 2. api.recete.co.uk  —  Hono API (direct)
# ──────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.recete.co.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.recete.co.uk;

    ssl_certificate     /etc/letsencrypt/live/api.recete.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.recete.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI/RAG requests
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}


# ──────────────────────────────────────────────
# 3. shop.recete.co.uk  —  Shopify App Shell
# ──────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name shop.recete.co.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.recete.co.uk;

    ssl_certificate     /etc/letsencrypt/live/shop.recete.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.recete.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    # Shopify embeds this in an iframe — allow Shopify admin origins
    add_header Content-Security-Policy   "frame-ancestors 'self' https://*.myshopify.com https://admin.shopify.com;" always;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
