# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "SHOPIFY_API_KEY"
name = "Recete-Retention Agent"
application_url = "https://recete.co.uk"
embedded = true

[access_scopes]
# Scopes required for the app's functionality
scopes = "read_products,read_orders,read_fulfillments,read_customers,write_webhooks"

[auth]
redirect_urls = [
  "https://recete.co.uk/api/integrations/shopify/oauth/callback"
]

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [
    "orders/create",
    "orders/fulfilled",
    "orders/updated",
    "app_subscriptions/update",
    "app/uninstalled"
  ]
  uri = "/webhooks/commerce/shopify"

  [[webhooks.subscriptions]]
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact"
  ]
  uri = "/api/webhooks/shopify/gdpr"

[pos]
embedded = false
