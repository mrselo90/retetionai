# Nginx example: single server, Frontend on 3001, API on 3002, Shopify on 3003
# See docs/deployment/PORTS_AND_ROUTING.md for the canonical port convention.
#
# ┌──────────────────────────────────────────────────────────────┐
# │  PRODUCTION (HTTPS) → use nginx/recete-https.conf instead.  │
# │  Run: bash nginx/setup-https.sh                             │
# └──────────────────────────────────────────────────────────────┘
#
# This file is the LOCAL / HTTP-only reference for development.
# Replace YOUR_DOMAIN_OR_IP with your server name or IP (e.g. 167.172.60.234).

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Frontend (Next.js) - all pages and the API proxy path
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Browser sends /api-backend/* to same origin; must hit frontend so Next.js can proxy to API
    location /api-backend/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes and health - direct to API (Hono)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhooks/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
