name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Load NVM and node
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Load PNPM
            export PNPM_HOME="/root/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            
            echo "🚀 Starting automated deployment..."
            
            cd /root/retetionai
            
            echo "📦 Pulling latest code..."
            git pull origin main
            
            echo "📥 Installing dependencies..."
            pnpm install

            echo "🗄️ Running Supabase migrations..."
            if command -v psql &> /dev/null && [ -n "$DATABASE_URL" ]; then
              bash supabase/run-migrations.sh
            else
              echo "⚠️  psql not available or DATABASE_URL not set, skipping Supabase migrations"
            fi

            echo "🗄️ Syncing Shopify shell Prisma schema..."
            pnpm --filter @recete/shopify-app prisma db push
            
            echo "🔨 Building the application..."
            pnpm build
            
            echo "🔄 Restarting PM2 services..."
            pm2 restart all --update-env
            
            echo "⏳ Waiting for services to start..."
            sleep 10
            
            echo "🏥 Running post-deploy health check..."
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3002/health || echo "000")
            if [ "$HEALTH_STATUS" != "200" ]; then
              echo "❌ Health check failed (HTTP $HEALTH_STATUS). Rolling back..."
              git checkout HEAD~1
              pnpm install
              pnpm build
              pm2 restart all --update-env
              echo "🔙 Rolled back to previous version"
              exit 1
            fi
            
            echo "🔒 Verifying HTTPS endpoint..."
            HTTPS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://recete.co.uk/health 2>/dev/null || echo "000")
            if [ "$HTTPS_STATUS" != "200" ]; then
              echo "⚠️  HTTPS health check returned HTTP $HTTPS_STATUS (may be OK if DNS/cert not yet configured)"
            else
              echo "✅ HTTPS endpoint healthy"
            fi

            echo "✅ Deployment completed successfully! Health check passed."
